services:
  alchemy-media-agent:
    build:
      context: .
      dockerfile: ./src_skeleton/Dockerfile
    image: alchemy-media-agent:latest
    container_name: alchemy-media-agent
    env_file:
      - ./src_skeleton/.env
    environment:
      V2_API_PROXY_BASE_URL: ${V2_API_PROXY_BASE_URL:-http://127.0.0.1:8020}
      V2_STORAGE_DIR: ${V2_STORAGE_DIR:-/var/lib/alchemy/v2/storage}
    network_mode: host
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "127.0.0.1", "--port", "${APP_PORT:-8017}"]
    volumes:
      - ./src_skeleton/.env:/app/.env
      - ${V1_MEDIA_STORAGE_DIR:-/var/lib/alchemy/v1/media_storage}:/app/.media_storage
      - ${V2_STORAGE_DIR:-/var/lib/alchemy/v2/storage}:${V2_STORAGE_DIR:-/var/lib/alchemy/v2/storage}:ro
    restart: unless-stopped
