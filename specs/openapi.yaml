openapi: 3.1.0
info:
  title: Custom Media Generation Agent API
  version: 0.1.0
  description: API draft for a chat-based image/video generation agent platform.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
paths:
  /v1/sessions:
    post:
      summary: Create a chat session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
  /v1/sessions/{session_id}/messages:
    post:
      summary: Send a user message to the agent runtime
      operationId: sendMessage
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
  /v1/sessions/{session_id}/events:
    get:
      summary: Stream session events using SSE
      operationId: streamSessionEvents
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
  /v1/assets/upload-url:
    post:
      summary: Create a signed upload URL
      operationId: createAssetUploadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetUploadRequest'
      responses:
        '200':
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAssetUploadResponse'
  /v1/assets/{asset_id}/complete:
    post:
      summary: Mark upload complete and start processing
      operationId: completeAssetUpload
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Asset accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
  /v1/assets/{asset_id}/content:
    put:
      summary: Upload asset bytes as base64 JSON for local development
      operationId: putAssetContent
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetContentUploadRequest'
      responses:
        '200':
          description: Asset content stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    get:
      summary: Read stored asset bytes
      operationId: getAssetContent
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Stored asset bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /v1/assets/{asset_id}:
    get:
      summary: Get asset status and material brief
      operationId: getAsset
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
  /v1/assets/{asset_id}/intent:
    put:
      summary: Save an advanced asset intent preset
      operationId: setAssetIntent
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetIntent'
      responses:
        '200':
          description: Asset intent saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetIntent'
  /v1/assets/{asset_id}/masks:
    post:
      summary: Create a mask for local image editing
      operationId: createAssetMask
      parameters:
        - name: asset_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetMaskRequest'
      responses:
        '200':
          description: Mask created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAssetMaskResponse'
  /v1/image/jobs:
    post:
      summary: Create an image generation job
      operationId: createImageJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageJobRequest'
      responses:
        '200':
          description: Image job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /v1/image/jobs/{job_id}:
    get:
      summary: Get image job status
      operationId: getImageJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Image job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /v1/image/history:
    get:
      summary: List historical image outputs
      operationId: listImageHistory
      parameters:
        - name: session_id
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Historical image outputs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageHistoryResponse'
  /v1/image/jobs/{job_id}/revise:
    post:
      summary: Revise an image output
      operationId: reviseImageJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviseImageRequest'
      responses:
        '200':
          description: Revision job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /v1/video/jobs:
    post:
      summary: Create a video generation job, experimental
      operationId: createVideoJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVideoJobRequest'
      responses:
        '200':
          description: Video job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /v1/video/jobs/{job_id}:
    get:
      summary: Get video job status
      operationId: getVideoJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Video job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
  /v1/providers:
    get:
      summary: List configured providers and capabilities
      operationId: listProviders
      responses:
        '200':
          description: Providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderCapabilities'
  /v1/outputs/{output_id}/download:
    get:
      summary: Download a generated output file
      operationId: downloadOutput
      parameters:
        - name: output_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Generated output bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /v1/outputs/{output_id}/thumbnail:
    get:
      summary: Download a cached thumbnail for an image output
      operationId: thumbnailOutput
      parameters:
        - name: output_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cached image thumbnail bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateSessionRequest:
      type: object
      properties:
        project_id: { type: string }
        title: { type: string }
        orchestration_mode:
          type: string
          enum: [runtime_first, claude_first]
      required: [project_id]
    Session:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        title: { type: string }
        created_at: { type: string, format: date-time }
    SendMessageRequest:
      type: object
      properties:
        text: { type: string }
        asset_ids:
          type: array
          items: { type: string }
        target:
          type: string
          enum: [auto, image, video, revise, batch]
        preferences:
          type: object
          additionalProperties: true
      required: [text]
    SendMessageResponse:
      type: object
      properties:
        message_id: { type: string }
        assistant_text: { type: string }
        job_ids:
          type: array
          items: { type: string }
    CreateAssetUploadRequest:
      type: object
      properties:
        filename: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        declared_role:
          type: string
          enum: [style_reference, subject_reference, logo_overlay, portrait_identity, background_reference, composition_reference, local_edit, negative_reference]
        intended_use: { type: string, example: "image_generation" }
        consent:
          $ref: '#/components/schemas/AssetConsent'
      required: [filename, mime_type, size_bytes, consent]
    CreateAssetUploadResponse:
      type: object
      properties:
        asset_id: { type: string }
        upload_url: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
    AssetContentUploadRequest:
      type: object
      properties:
        content_base64: { type: string }
        mime_type: { type: string }
      required: [content_base64]
    Asset:
      type: object
      properties:
        id: { type: string }
        status:
          type: string
          enum: [created, upload_requested, uploaded, scanning, stored, normalized, derivatives_ready, extracting, analyzed, ready, scan_failed, normalize_failed, analysis_failed, unsupported_type, policy_blocked, failed, rejected]
        mime_type: { type: string }
        thumbnail_url: { type: string }
        normalized_url: { type: string }
        material_brief:
          type: object
          additionalProperties: true
        consent:
          $ref: '#/components/schemas/AssetConsent'
    AssetConsent:
      type: object
      properties:
        user_confirmed_rights: { type: boolean, default: false }
        portrait_identity_allowed: { type: boolean, default: false }
        logo_or_trademark_allowed: { type: boolean, default: false }
        commercial_use_allowed: { type: boolean, default: false }
        source_note: { type: string }
    AssetIntent:
      type: object
      properties:
        asset_id: { type: string }
        role:
          type: string
          enum: [style_reference, subject_reference, logo_overlay, portrait_identity, background_reference, composition_reference, local_edit, negative_reference]
        priority: { type: integer, minimum: 1, maximum: 100, default: 50 }
        preservation:
          type: string
          enum: [loose, medium, strict, exact]
          default: loose
        strength: { type: number, minimum: 0, maximum: 1, default: 0.5 }
        notes: { type: string }
        placement:
          $ref: '#/components/schemas/AssetPlacement'
        mask_id: { type: string }
        consent:
          $ref: '#/components/schemas/AssetConsent'
      required: [asset_id, role]
    AssetPlacement:
      type: object
      properties:
        anchor:
          type: string
          enum: [top_left, top_center, top_right, center_left, center, center_right, bottom_left, bottom_center, bottom_right, custom]
          default: bottom_right
        margin_ratio: { type: number, minimum: 0, maximum: 0.5, default: 0.06 }
        width_ratio: { type: number, minimum: 0.01, maximum: 1, default: 0.18 }
        height_ratio: { type: number, minimum: 0.01, maximum: 1 }
        opacity: { type: number, minimum: 0, maximum: 1, default: 1 }
        safe_area: { type: boolean, default: true }
        x_ratio: { type: number, minimum: 0, maximum: 1 }
        y_ratio: { type: number, minimum: 0, maximum: 1 }
    CreateAssetMaskRequest:
      type: object
      properties:
        mask_type:
          type: string
          enum: [polygon, brush, rectangle]
        points:
          type: array
          items:
            type: object
            properties:
              x: { type: number, minimum: 0, maximum: 1 }
              y: { type: number, minimum: 0, maximum: 1 }
            required: [x, y]
        label: { type: string }
      required: [mask_type]
    CreateAssetMaskResponse:
      type: object
      properties:
        mask_id: { type: string }
        mask_url: { type: string }
    CreateImageJobRequest:
      type: object
      properties:
        session_id: { type: string }
        prompt: { type: string }
        asset_mode:
          type: string
          enum: [basic, advanced]
          default: basic
        asset_ids:
          type: array
          items: { type: string }
        asset_intents:
          type: array
          items:
            $ref: '#/components/schemas/AssetIntent'
        count: { type: integer, minimum: 1, maximum: 10 }
        size: { type: string, example: "1024x1536" }
        quality: { type: string, enum: [low, medium, high, auto] }
        output_format: { type: string, enum: [png, jpeg, webp] }
        work_intensity: { type: string, enum: [swift, balanced, studio, atelier] }
        provider_preference: { type: string }
        idempotency_key: { type: string }
      required: [session_id, prompt]
    ReviseImageRequest:
      type: object
      properties:
        output_id: { type: string }
        feedback: { type: string }
        preserve:
          type: array
          items: { type: string }
      required: [output_id, feedback]
    CreateVideoJobRequest:
      type: object
      properties:
        session_id: { type: string }
        task_type:
          type: string
          enum: [text_to_video, image_to_video, reference_to_video, extend_video, first_last_frame_video]
        prompt: { type: string }
        asset_ids:
          type: array
          items: { type: string }
        duration_seconds: { type: integer }
        aspect_ratio: { type: string, example: "9:16" }
        resolution: { type: string, example: "1080p" }
        provider_preference: { type: string }
      required: [session_id, task_type, prompt]
    GenerationJob:
      type: object
      properties:
        id: { type: string }
        session_id: { type: string }
        job_type: { type: string, enum: [image, video] }
        status: { type: string }
        provider: { type: string }
        model: { type: string }
        asset_mode: { type: string, enum: [basic, advanced] }
        asset_plan:
          type: object
          additionalProperties: true
        prompt_plan:
          type: object
          additionalProperties: true
        postprocess_steps:
          type: array
          items:
            type: object
            additionalProperties: true
        provenance:
          type: object
          additionalProperties: true
        video_request:
          type: object
          additionalProperties: true
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/GenerationOutput'
        error:
          type: object
          additionalProperties: true
        cost_estimate:
          type: object
          additionalProperties: true
        idempotency_key: { type: string }
        trace_id: { type: string }
        version_parent_id: { type: string }
        raw_response_summary:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    GenerationOutput:
      type: object
      properties:
        id: { type: string }
        url: { type: string }
        thumbnail_url: { type: string }
        format: { type: string }
        width: { type: integer }
        height: { type: integer }
        duration_seconds: { type: number }
        score:
          type: object
          additionalProperties: true
        version_parent_id: { type: string }
        metadata:
          type: object
          additionalProperties: true
    ImageHistoryResponse:
      type: object
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImageHistoryItem'
    ImageHistoryItem:
      type: object
      properties:
        id: { type: string }
        job_id: { type: string }
        session_id: { type: string }
        url: { type: string }
        thumbnail_url: { type: string }
        format: { type: string, enum: [png, jpeg, webp] }
        width: { type: integer }
        height: { type: integer }
        provider: { type: string }
        model: { type: string }
        requested_provider: { type: string }
        requested_model: { type: string }
        provider_fallback: { type: boolean }
        asset_mode: { type: string, enum: [basic, advanced] }
        asset_intents:
          type: array
          items:
            $ref: '#/components/schemas/AssetIntent'
        asset_plan:
          type: object
          additionalProperties: true
        prompt_plan:
          type: object
          additionalProperties: true
        original_prompt: { type: string }
        final_prompt: { type: string }
        prompt: { type: string }
        size: { type: string }
        version_parent_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        source: { type: string, enum: [repository, manifest] }
    ProviderCapabilities:
      type: object
      properties:
        provider: { type: string }
        configured: { type: boolean }
        models:
          type: array
          items: { type: string }
        model_capabilities:
          type: array
          items:
            $ref: '#/components/schemas/ProviderModelCapabilities'
        operations:
          type: array
          items: { type: string }
        limits:
          type: object
          additionalProperties: true
        is_mock: { type: boolean }
        reason: { type: string }
    ProviderModelCapabilities:
      type: object
      properties:
        id: { type: string }
        capabilities:
          type: array
          items:
            type: string
            enum: [text_to_image, image_reference, image_edit, mask_edit, multi_image_reference, transparent_output, provider_file_upload]
        advanced_asset_roles:
          type: array
          items:
            type: string
            enum: [style_reference, subject_reference, logo_overlay, portrait_identity, background_reference, composition_reference, local_edit, negative_reference]
